# Build Linux + Windows desktop installers on native runners.
# Triggered automatically when promote.sh creates a GitHub Release,
# or manually via workflow_dispatch.
name: Desktop Release (Linux + Windows)

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v0.27.126)'
        required: true

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            args: --linux --x64
          - os: windows-latest
            platform: win
            args: --win --x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build GUI
        run: npm run build -w packages/gui

      - name: Bundle daemon + moe-training
        run: node packages/desktop/bundle-daemon.js

      - name: Build desktop (${{ matrix.platform }})
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always
